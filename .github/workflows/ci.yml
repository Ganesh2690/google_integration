name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: interview_calendar_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install .[dev]

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy app

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/interview_calendar_test
          SECRET_KEY: test-secret
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
        run: alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/interview_calendar_test
          SECRET_KEY: test-secret
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
        run: pytest -q

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
